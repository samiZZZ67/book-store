{% extends "library/base.html" %}
{% load static %}

{% block title %}{{ book.title }}{% endblock %}
{% block main_class %}viewer-page{% endblock %}

{% block content %}
<div
    id="reader-app"
    class="reader-app"
    data-pdf-url="{{ stream_url }}"
    data-book-id="{{ book.id }}"
    data-book-title="{{ book.title }}"
>
    <header class="reader-header">
        <div>
            <h1>{{ book.title }}</h1>
            <div class="reader-progress">
                <span id="page-status">Loading</span>
            </div>
        </div>
        <div class="actions">
            <a class="button" href="{% url 'home' %}">Exit</a>
        </div>
    </header>

    <div class="reader-toolbar" aria-label="PDF reader controls">
        <button id="contrast-toggle" type="button">Contrast 1</button>
        <button id="first-page" type="button">First Page</button>
        <button id="last-page" type="button">Last Page</button>
        <button id="fullscreen-btn" type="button">Full Screen</button>
        <button id="exit-fullscreen-btn" type="button">Exit Full Screen</button>
        <button id="fit-width" type="button">Fit Width</button>
        <label class="reader-page-jump" for="page-number">Page</label>
        <input id="page-number" type="number" min="1" value="1">
        <span id="page-count">/ 0</span>
        <button id="search-page" type="button">Search Page</button>
    </div>

    <div class="reader-workspace">
        <section id="canvas-shell" class="canvas-shell">
            <p id="reader-loading" class="reader-loading">Loading PDF...</p>
            <canvas id="pdf-canvas"></canvas>
        </section>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="{% static 'library/reader.js' %}"></script>
{% endblock %}
