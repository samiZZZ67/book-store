services:
  - type: web
    name: pdf-library
    env: python
    buildCommand: bash build.sh
    startCommand: python manage.py migrate && gunicorn pdfsite.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DB_SSL_REQUIRE
        value: "1"
      - key: MEDIA_ROOT
        value: "/var/data/private_media"
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pdf-library-db
          property: connectionString
    disk:
      name: pdf-library-media
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: pdf-library-db
    databaseName: pdf_library
    user: pdf_library
